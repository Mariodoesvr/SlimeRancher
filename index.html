<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Slime Rancher | OFFLINE BUILD</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        #gameContainer { width: 100vw; height: 100vh; }
    </style>

    <script>
        var embeddedJsonData = {
            "companyName": "Snubs",
            "productName": "SlimeRancher Prototype",
            "dataUrl": "Build/data", 
            "wasmCodeUrl": "Build/wasmCode", 
            "wasmFrameworkUrl": "Build/wasmFramework", 
            "TOTAL_MEMORY": 536870912,
            "graphicsAPI": ["WebGL 2.0", "WebGL 1.0"],
            "webglContextAttributes": {"preserveDrawingBuffer": true},
            "splashScreenStyle": "Dark",
            "backgroundColor": "#000000"
        };
    </script>

    <script src="Build/UnityLoader.js"></script>
    
    <script>
        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) return;
            // (The rest of the logic from your UnityProgress.html goes here)
            console.log("Loading: " + (progress * 100) + "%");
        }
    </script>
</head>

<body>
    <div id="gameContainer"></div>

    <script>
        // 4. Start the game and use the Progress bar
        var gameInstance = UnityLoader.instantiate("gameContainer", embeddedJsonData, {onProgress: UnityProgress});
    </script>
</body>
</html>
