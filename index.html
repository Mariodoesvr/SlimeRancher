<!DOCTYPE html><html lang="en-us"><head><meta charset="utf-8"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><title>Unity WebGL Player | Slime Rancher</title><style>body { margin: 0; background-color: #000; overflow: hidden; }#gameContainer { width: 100vw; height: 100vh; }</style><!-- 1. The Engine Loader (Downloaded by your script) --><script src="UnityLoader.js"></script><script>  // 2. The Configuration - Adjusted to target files in the SAME directory  var gameInstance = UnityLoader.instantiate("gameContainer", {    "companyName": "Snubs",    "productName": "SlimeRancher Prototype",    "dataUrl": "data",     "wasmCodeUrl": "wasmCode",     "wasmFrameworkUrl": "wasmFramework",     "TOTAL_MEMORY": 536870912,    "graphicsAPI": ["WebGL 2.0", "WebGL 1.0"],    "webglContextAttributes": {"preserveDrawingBuffer": true},    "splashScreenStyle": "Dark",    "backgroundColor": "#000000"  }, {onProgress: UnityProgress});  // 3. Progress Bar Logic  function UnityProgress(gameInstance, progress) {    if (!gameInstance.Module) return;    if (!gameInstance.progress) {      console.log("Loading game...");    }    if (progress == 1) {      console.log("Loading complete!");    }  }</script></head><body><!-- 4. The Game Container --><div id="gameContainer"></div></body></html>
